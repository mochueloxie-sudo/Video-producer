<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700;800&family=Manrope:wght@400;500;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { width: 1920px; height: 1080px; overflow: hidden; }
  body {
    width: 1920px; height: 1080px;
    background: {{BODY_BG}};
    font-family: '{{FONT}}', 'PingFang SC', sans-serif;
    color: {{TEXT_PRIMARY}};
    padding: 80px 120px 100px;
    display: flex; flex-direction: column; justify-content: center;
    position: relative; overflow: hidden;
  }
  /* ── Top: big number hero ───────────────────────────────── */
  .number-hero {
    display: flex; align-items: flex-end; gap: 0;
    margin-bottom: 48px; flex-shrink: 0;
  }
  .eyebrow {
    font-size: 13px; font-weight: 800; letter-spacing: 0.2em;
    color: {{EYEBROW_COLOR}}; text-transform: uppercase;
    margin-bottom: 16px;
  }
  .big-number {
    font-size: 160px; font-weight: 800; line-height: 0.85;
    letter-spacing: -0.06em;
    color: {{ACCENT_LIGHT}};
    font-family: '{{FONT}}', sans-serif;
  }
  .number-meta {
    margin-left: 28px; padding-bottom: 16px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .number-unit {
    font-size: 40px; font-weight: 300;
    color: {{TEXT_MUTED}};
    line-height: 1;
  }
  .number-label {
    font-size: 24px; font-weight: 500;
    color: {{TEXT_SECONDARY}};
    line-height: 1.3;
  }
  .divider {
    width: 100%; height: 1px; background: {{HAIRLINE_COLOR}};
    margin-bottom: 40px; flex-shrink: 0;
  }
  /* ── Bottom: bullet explanations ───────────────────────── */
  .bullets {
    display: flex; gap: 32px; align-items: stretch; flex: 1;
  }
  .bullet-item {
    flex: 1;
    background: {{PANEL_BG}};
    border: {{PANEL_BORDER}};
    border-top: {{PANEL_BORDER_TOP}};
    border-bottom: {{PANEL_BORDER_BOTTOM}};
    box-shadow: {{PANEL_SHADOW}};
    border-radius: {{PANEL_RADIUS}};
    backdrop-filter: blur({{PANEL_BLUR}});
    -webkit-backdrop-filter: blur({{PANEL_BLUR}});
    padding: 28px 32px;
    display: flex; align-items: flex-start; gap: 16px;
  }
  .bullet-num {
    font-size: 42px; font-weight: 800;
    color: {{ACCENT}}; line-height: 1; flex-shrink: 0;
    font-family: '{{FONT}}', sans-serif;
  }
  .bullet-text-wrap {
    display: flex; flex-direction: column; gap: 8px; padding-top: 4px; flex: 1; min-width: 0;
  }
  .bullet-text {
    font-size: 22px; line-height: 1.5;
    color: {{TEXT_SECONDARY}};
  }
  .bullet-desc {
    font-size: 17px; line-height: 1.58;
    color: {{TEXT_MUTED}}; opacity: 0.82;
  }
  /* ── Footer ─────────────────────────────────────────────── */
  .hairline {
    position: absolute; bottom: 80px; left: 120px; right: 120px;
    height: 1px; background: {{HAIRLINE_COLOR}};
  }
  .page-num {
    position: absolute; bottom: 56px; right: 120px;
    font-size: 13px; color: {{TEXT_MUTED}};
  }

  /* ── hover: 与入场动画并存（不用 transform）──────────────────────────── */
  @media (hover: hover) and (pointer: fine) {
    .bullets .bullet-item {
      transition: outline-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      outline: 2px solid transparent;
      outline-offset: 3px;
    }
    .bullets .bullet-item:hover {
      outline-color: rgba(255,255,255,0.28);
      box-shadow: 0 10px 36px rgba(0,0,0,0.3);
    }
  }

  /* ── layout hints ─────────────────────────────────────────── */
  body.layout-hero { flex-direction: row; align-items: center; }
  body.layout-hero .number-hero { flex-direction: column; align-items: flex-start; margin-bottom: 0; margin-right: 80px; flex-shrink: 0; }
  body.layout-hero .big-number { font-size: 200px; }
  body.layout-hero .divider { display: none; }
  body.layout-hero .bullets { flex-direction: column; }
  body.layout-hero .bullet-item { flex: 0 0 auto; }
</style>
</head>
<body>
  <div class="eyebrow">{{EYEBROW}}</div>
  <div class="number-hero">
    <div class="big-number">{{STAT_VALUE}}</div>
    <div class="number-meta">
      <div class="number-unit">{{STAT_UNIT}}</div>
      <div class="number-label">{{STAT_LABEL}}</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="bullets">
    {{BULLETS_HTML}}
  </div>
  <div class="hairline"></div>
  <span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
