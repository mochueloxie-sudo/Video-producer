<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Process Flow</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Manrope:wght@400;500;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { width: 1920px; height: 1080px; overflow: hidden; }

  body {
    width: 1920px; height: 1080px;
    background: {{BODY_BG}};
    font-family: '{{FONT}}', 'PingFang SC', sans-serif;
    color: {{TEXT_PRIMARY}};
    padding: 80px 120px;
    position: relative;
  }
  .eyebrow {
    font-size: 13px; font-weight: 800; letter-spacing: 0.2em;
    color: {{EYEBROW_COLOR}}; text-transform: uppercase; margin-bottom: 20px;
  }
  .title {
    font-size: 58px; font-weight: 800; line-height: 1.05;
    color: {{TEXT_PRIMARY}}; margin-bottom: 48px; max-width: 1100px;
  }

  /* ── Horizontal rail ─────────────────────────────────────────────────── */
  .pf-rail {
    display: flex;
    align-items: stretch;
    justify-content: space-between;
    gap: 0;
    max-width: 1680px;
    position: relative;
    padding-top: 8px;
  }
  .pf-rail::before {
    content: '';
    position: absolute;
    left: 60px; right: 60px; top: 50%;
    height: 2px;
    background: linear-gradient(90deg, transparent, {{HAIRLINE_COLOR}}, transparent);
    z-index: 0;
    pointer-events: none;
  }
  .pf-stage {
    flex: 1;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 0 12px;
    max-width: 320px;
  }
  .pf-node {
    width: 22px; height: 22px; border-radius: 50%;
    background: {{ACCENT}};
    box-shadow: 0 0 16px {{ACCENT}};
    margin-bottom: 20px;
    flex-shrink: 0;
  }
  .pf-card {
    width: 100%;
    background: {{PANEL_BG}};
    border: {{PANEL_BORDER}};
    border-top: {{PANEL_BORDER_TOP}};
    border-bottom: {{PANEL_BORDER_BOTTOM}};
    box-shadow: {{PANEL_SHADOW}};
    border-radius: {{PANEL_RADIUS}};
    backdrop-filter: blur({{PANEL_BLUR}});
    -webkit-backdrop-filter: blur({{PANEL_BLUR}});
    padding: 24px 22px 28px;
    min-height: 200px;
  }
  .pf-label {
    font-size: 22px; font-weight: 700;
    color: {{TEXT_PRIMARY}};
    line-height: 1.35;
    margin-bottom: 8px;
  }
  .pf-desc {
    font-size: 17px;
    color: {{TEXT_SECONDARY}};
    line-height: 1.55;
  }

  /* ── Swimlanes ─────────────────────────────────────────────────────────── */
  .pf-swimlanes {
    display: flex;
    flex-direction: column;
    gap: 28px;
    max-width: 1680px;
  }
  .pf-lane {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 28px;
    align-items: stretch;
  }
  .pf-lane-label {
    font-size: 14px; font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: {{ACCENT}};
    padding-top: 12px;
    border-top: 2px solid {{HAIRLINE_COLOR}};
  }
  .pf-lane-track {
    display: flex;
    gap: 16px;
    align-items: stretch;
    border-top: 2px solid {{HAIRLINE_COLOR}};
    padding-top: 16px;
  }
  .pf-cell {
    flex: 1;
    background: {{PANEL_BG}};
    border: {{PANEL_BORDER}};
    border-radius: {{PANEL_RADIUS}};
    padding: 18px 20px;
    min-height: 120px;
    box-shadow: {{PANEL_SHADOW}};
    backdrop-filter: blur({{PANEL_BLUR}});
    -webkit-backdrop-filter: blur({{PANEL_BLUR}});
  }
  .pf-cell .pf-label { font-size: 19px; text-align: left; }
  .pf-cell .pf-desc { font-size: 16px; text-align: left; }

  .pf-swimlanes { display: none; flex-direction: column; }
  body.layout-swimlane .pf-rail { display: none !important; }
  body.layout-swimlane .pf-swimlanes { display: flex !important; }

  .hairline {
    position: absolute; bottom: 80px; left: 120px; right: 120px;
    height: 1px; background: {{HAIRLINE_COLOR}};
  }
  .page-num {
    position: absolute; bottom: 56px; right: 120px;
    font-size: 13px; color: {{TEXT_MUTED}};
  }

  /* hover: 不用 transform/filter，与 data-vp-animate 入场并存 */
  @media (hover: hover) and (pointer: fine) {
    .pf-card, .pf-cell {
      transition: outline-color 0.2s ease, box-shadow 0.2s ease;
      outline: 2px solid transparent;
      outline-offset: 3px;
    }
    .pf-card:hover, .pf-cell:hover {
      outline-color: rgba(255,255,255,0.28);
      box-shadow: 0 14px 48px rgba(0,0,0,0.38);
    }
  }
</style>
</head>
<body>
  <div class="eyebrow">{{EYEBROW}}</div>
  <h1 class="title">{{TITLE}}</h1>
  <div class="pf-rail">{{PROCESS_RAIL_HTML}}</div>
  <div class="pf-swimlanes">{{PROCESS_SWIMLANES_HTML}}</div>
  <div class="hairline"></div>
  <span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
