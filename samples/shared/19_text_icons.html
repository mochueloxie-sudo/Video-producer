<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>{{TITLE}}</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700;800&family=Manrope:wght@400;500;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { width: 1920px; height: 1080px; overflow: hidden; }
  body {
    width: 1920px; height: 1080px;
    background: {{BODY_BG}};
    font-family: '{{FONT}}', 'PingFang SC', sans-serif;
    color: {{TEXT_PRIMARY}};
    display: flex; align-items: stretch;
    position: relative; overflow: hidden;
  }
  /* ── Left: text content ─────────────────────────────────── */
  .left {
    flex: 0 0 960px;
    padding: 80px 80px 100px 120px;
    display: flex; flex-direction: column; justify-content: center;
    border-right: 1px solid {{HAIRLINE_COLOR}};
  }
  .eyebrow {
    font-size: 13px; font-weight: 800; letter-spacing: 0.2em;
    color: {{EYEBROW_COLOR}}; text-transform: uppercase; margin-bottom: 18px;
  }
  .title {
    font-size: 56px; font-weight: 800; line-height: 1.05;
    color: {{TEXT_PRIMARY}}; margin-bottom: 32px;
  }
  .body-text {
    font-size: 22px; line-height: 1.65;
    color: {{TEXT_SECONDARY}};
  }
  /* ── Right: icon grid ───────────────────────────────────── */
  .right {
    flex: 1;
    padding: 80px 60px;
    display: flex; flex-direction: column; justify-content: center;
    gap: 24px;
  }
  .icon-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    align-content: center;
  }
  .icon-card {
    background: {{PANEL_BG}};
    border: {{PANEL_BORDER}};
    border-top: {{PANEL_BORDER_TOP}};
    box-shadow: {{PANEL_SHADOW}};
    border-radius: {{PANEL_RADIUS}};
    backdrop-filter: blur({{PANEL_BLUR}});
    -webkit-backdrop-filter: blur({{PANEL_BLUR}});
    padding: 28px 20px;
    display: flex; flex-direction: column;
    align-items: center; gap: 12px;
    text-align: center;
  }
  .icon-emoji { font-size: 52px; line-height: 1; }
  .icon-label {
    font-size: 17px; font-weight: 500;
    color: {{TEXT_SECONDARY}}; line-height: 1.4;
  }
  /* ── Footer ─────────────────────────────────────────────── */
  .hairline {
    position: absolute; bottom: 80px; left: 120px; right: 120px;
    height: 1px; background: {{HAIRLINE_COLOR}};
  }
  .page-num {
    position: absolute; bottom: 56px; right: 120px;
    font-size: 13px; color: {{TEXT_MUTED}};
  }

  /* ── hover: 与入场动画并存（不用 transform）──────────────────────────── */
  @media (hover: hover) and (pointer: fine) {
    .icon-grid .icon-card {
      transition: outline-color 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      outline: 2px solid transparent;
      outline-offset: 3px;
    }
    .icon-grid .icon-card:hover {
      outline-color: rgba(255,255,255,0.3);
      box-shadow: 0 12px 40px rgba(0,0,0,0.32);
    }
  }

  /* ── layout hints ─────────────────────────────────────────── */
  body.layout-wide-left .left { flex: 0 0 1120px; }
  body.layout-wide-left .icon-grid { grid-template-columns: 1fr; }
  body.layout-vertical { flex-direction: column; }
  body.layout-vertical .left { flex: 0 0 auto; border-right: none; border-bottom: 1px solid {{HAIRLINE_COLOR}}; padding: 60px 120px 40px; }
  body.layout-vertical .right { padding: 40px 120px 80px; }
  body.layout-vertical .icon-grid { grid-template-columns: repeat(4, 1fr); }
</style>
</head>
<body>
  <div class="left">
    <div class="eyebrow">{{EYEBROW}}</div>
    <h1 class="title">{{TITLE}}</h1>
    <div class="body-text">{{SUBTITLE}}</div>
  </div>
  <div class="right">
    <div class="icon-grid">{{ICONS_HTML}}</div>
  </div>
  <div class="hairline"></div>
  <span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
