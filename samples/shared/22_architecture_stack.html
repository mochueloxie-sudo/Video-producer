<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Architecture Stack</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Manrope:wght@400;500;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { width: 1920px; height: 1080px; overflow: hidden; }

  body {
    width: 1920px; height: 1080px;
    background: {{BODY_BG}};
    font-family: '{{FONT}}', 'PingFang SC', sans-serif;
    color: {{TEXT_PRIMARY}};
    padding: 80px 120px;
    position: relative;
  }
  .eyebrow {
    font-size: 13px; font-weight: 800; letter-spacing: 0.2em;
    color: {{EYEBROW_COLOR}}; text-transform: uppercase; margin-bottom: 20px;
  }
  .title {
    font-size: 58px; font-weight: 800; line-height: 1.05;
    color: {{TEXT_PRIMARY}}; margin-bottom: 40px; max-width: 1100px;
  }
  .arch-stack {
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 1240px;
  }
  .arch-layer {
    display: grid;
    grid-template-columns: 6px 1fr;
    gap: 0;
    background: {{PANEL_BG}};
    border: {{PANEL_BORDER}};
    border-top: {{PANEL_BORDER_TOP}};
    border-bottom: {{PANEL_BORDER_BOTTOM}};
    box-shadow: {{PANEL_SHADOW}};
    border-radius: {{PANEL_RADIUS}};
    backdrop-filter: blur({{PANEL_BLUR}});
    -webkit-backdrop-filter: blur({{PANEL_BLUR}});
    overflow: hidden;
    min-height: 96px;
  }
  .arch-accent {
    background: linear-gradient(180deg, {{ACCENT}}, {{ACCENT_LIGHT}});
    opacity: 0.92;
  }
  .arch-inner {
    padding: 22px 32px 24px 28px;
  }
  .arch-layer-title {
    font-size: 26px;
    font-weight: 700;
    color: {{TEXT_PRIMARY}};
    margin-bottom: 8px;
    letter-spacing: -0.02em;
  }
  .arch-layer-desc {
    font-size: 19px;
    line-height: 1.55;
    color: {{TEXT_SECONDARY}};
  }

  body.layout-compact .arch-stack { gap: 8px; }
  body.layout-compact .arch-layer { min-height: 72px; }
  body.layout-compact .arch-inner { padding: 14px 24px 16px 20px; }
  body.layout-compact .arch-layer-title { font-size: 22px; margin-bottom: 4px; }
  body.layout-compact .arch-layer-desc { font-size: 16px; }

  .hairline {
    position: absolute; bottom: 80px; left: 120px; right: 120px;
    height: 1px; background: {{HAIRLINE_COLOR}};
  }
  .page-num {
    position: absolute; bottom: 56px; right: 120px;
    font-size: 13px; color: {{TEXT_MUTED}};
  }

  /* hover: 不用 transform，与 data-vp-animate 入场并存 */
  @media (hover: hover) and (pointer: fine) {
    .arch-layer {
      transition: outline-color 0.2s ease, box-shadow 0.2s ease;
      outline: 2px solid transparent;
      outline-offset: 3px;
    }
    .arch-layer:hover {
      outline-color: rgba(255,255,255,0.28);
      box-shadow: 0 14px 48px rgba(0,0,0,0.38);
    }
  }
</style>
</head>
<body>
  <div class="eyebrow">{{EYEBROW}}</div>
  <h1 class="title">{{TITLE}}</h1>
  <div class="arch-stack">{{ARCH_LAYERS_HTML}}</div>
  <div class="hairline"></div>
  <span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
