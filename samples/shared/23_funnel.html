<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Funnel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Manrope:wght@400;500;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { width: 1920px; height: 1080px; overflow: hidden; }

  body {
    width: 1920px; height: 1080px;
    background: {{BODY_BG}};
    font-family: '{{FONT}}', 'PingFang SC', sans-serif;
    color: {{TEXT_PRIMARY}};
    padding: 80px 120px;
    position: relative;
  }
  .eyebrow {
    font-size: 13px; font-weight: 800; letter-spacing: 0.2em;
    color: {{EYEBROW_COLOR}}; text-transform: uppercase; margin-bottom: 20px;
  }
  .title {
    font-size: 58px; font-weight: 800; line-height: 1.05;
    color: {{TEXT_PRIMARY}}; margin-bottom: 40px; max-width: 1100px;
  }
  .fn-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    max-width: 1400px;
    margin: 0 auto;
  }
  .fn-tier {
    width: var(--fn-w, 100%);
    background: {{PANEL_BG}};
    border: {{PANEL_BORDER}};
    border-top: {{PANEL_BORDER_TOP}};
    border-bottom: {{PANEL_BORDER_BOTTOM}};
    box-shadow: {{PANEL_SHADOW}};
    border-radius: {{PANEL_RADIUS}};
    backdrop-filter: blur({{PANEL_BLUR}});
    -webkit-backdrop-filter: blur({{PANEL_BLUR}});
    padding: 20px 36px 22px;
    position: relative;
    clip-path: polygon(3% 0, 97% 0, 100% 100%, 0 100%);
  }
  .fn-tier::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0; width: 4px;
    z-index: 2;
    background: linear-gradient(180deg, {{ACCENT}}, {{ACCENT_LIGHT}});
    border-radius: {{PANEL_RADIUS}} 0 0 {{PANEL_RADIUS}};
    opacity: 0.9;
  }
  .fn-label {
    font-size: 24px;
    font-weight: 700;
    color: {{TEXT_PRIMARY}};
    margin-bottom: 6px;
    padding-left: 12px;
  }
  .fn-desc {
    font-size: 18px;
    line-height: 1.5;
    color: {{TEXT_SECONDARY}};
    padding-left: 12px;
  }
  .fn-label, .fn-desc { position: relative; z-index: 3; }
  /* hover 叠层：父级有入场 transform，避免在 .fn-tier 上用 transform/filter */
  .fn-tier::after {
    content: '';
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease;
    clip-path: polygon(3% 0, 97% 0, 100% 100%, 0 100%);
    background: rgba(255,255,255,0.1);
  }

  body.layout-compact .fn-wrap { gap: 6px; }
  body.layout-compact .fn-tier { padding: 14px 28px 16px; }
  body.layout-compact .fn-label { font-size: 20px; }
  body.layout-compact .fn-desc { font-size: 16px; }

  .hairline {
    position: absolute; bottom: 80px; left: 120px; right: 120px;
    height: 1px; background: {{HAIRLINE_COLOR}};
  }
  .page-num {
    position: absolute; bottom: 56px; right: 120px;
    font-size: 13px; color: {{TEXT_MUTED}};
  }

  @media (hover: hover) and (pointer: fine) {
    .fn-tier:hover::after { opacity: 1; }
  }
</style>
</head>
<body>
  <div class="eyebrow">{{EYEBROW}}</div>
  <h1 class="title">{{TITLE}}</h1>
  <div class="fn-wrap">{{FUNNEL_TIERS_HTML}}</div>
  <div class="hairline"></div>
  <span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
