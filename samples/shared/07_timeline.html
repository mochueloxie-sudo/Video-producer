<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<title>Timeline</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Manrope:wght@400;500;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { width: 1920px; height: 1080px; overflow: hidden; }

  body {
    width: 1920px; height: 1080px;
    background: {{BODY_BG}};
    font-family: '{{FONT}}', 'PingFang SC', sans-serif;
    color: {{TEXT_PRIMARY}};
    padding: 80px 120px;
    position: relative;
  }
  .eyebrow {
    font-size: 13px; font-weight: 800; letter-spacing: 0.2em;
    color: {{EYEBROW_COLOR}}; text-transform: uppercase; margin-bottom: 20px;
  }
  .title {
    font-size: 58px; font-weight: 800; line-height: 1.05;
    color: {{TEXT_PRIMARY}}; margin-bottom: 56px !important; max-width: 800px;
  }
  .timeline {
    display: flex;
    flex-direction: column;
    gap: 0;
    position: relative;
    padding-left: 48px;
    max-width: 1100px;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 15px; top: 8px; bottom: 8px;
    width: 2px;
    background: linear-gradient(to bottom, {{ACCENT}}, transparent);
    opacity: 0.4;
  }
  .step {
    display: flex;
    align-items: flex-start;
    gap: 28px;
    padding: 20px 0;
    position: relative;
  }
  .step-dot {
    position: absolute;
    left: -40px; top: 24px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: {{ACCENT}};
    box-shadow: 0 0 12px {{ACCENT}};
    flex-shrink: 0;
  }
  .step-num {
    font-size: 13px; font-weight: 800; letter-spacing: 0.12em;
    color: {{ACCENT}}; text-transform: uppercase;
    min-width: 48px; padding-top: 4px;
    flex-shrink: 0;
  }
  .step-content { flex: 1; }
  .step-label {
    font-size: 24px; font-weight: 700;
    color: {{TEXT_PRIMARY}}; line-height: 1.3;
    margin-bottom: 6px;
  }
  .step-desc {
    font-size: 18px; font-weight: 400;
    color: {{TEXT_SECONDARY}}; line-height: 1.55;
  }
  .step + .step { border-top: 1px solid {{HAIRLINE_COLOR}}; }
  .hairline {
    position: absolute; bottom: 80px; left: 120px; right: 120px;
    height: 1px; background: {{HAIRLINE_COLOR}};
  }
  .page-num {
    position: absolute; bottom: 56px; right: 120px;
    font-size: 13px; color: {{TEXT_MUTED}};
  }

  /* ── hover: 与入场动画并存（不用 transform）──────────────────────────── */
  @media (hover: hover) and (pointer: fine) {
    .timeline .step {
      transition: outline-color 0.2s ease, background-color 0.2s ease;
      outline: 2px solid transparent;
      outline-offset: 2px;
      border-radius: 12px;
    }
    .timeline .step:hover {
      outline-color: rgba(255,255,255,0.22);
      background-color: rgba(255,255,255,0.04);
    }
  }

  /* ── layout hints ─────────────────────────────────────────────────────── */
  /* horizontal: 步骤横向排列 */
  body.layout-horizontal .title { margin-bottom: 80px !important; }
  body.layout-horizontal .timeline {
    flex-direction: row; padding-left: 0; gap: 0;
    align-items: flex-start; max-width: 100%;
  }
  body.layout-horizontal .timeline::before { display: none; }
  body.layout-horizontal .step {
    flex: 1; flex-direction: column; align-items: center;
    text-align: center; padding: 0 24px; gap: 12px; border-top: none;
  }
  body.layout-horizontal .step + .step { border-top: none; border-left: 1px solid rgba(255,255,255,0.1); }
  body.layout-horizontal .step-dot { position: static; margin-bottom: 8px; }
  body.layout-horizontal .step-num { font-size: 13px; }
  body.layout-horizontal .step-label { font-size: 20px; }
  body.layout-horizontal .step-desc  { font-size: 15px; }
  /* alternating: 奇偶步骤左右交错 */
  body.layout-alternating .timeline { padding-left: 0; max-width: 100%; }
  body.layout-alternating .timeline::before { left: 50%; transform: translateX(-50%); }
  body.layout-alternating .step { width: 44%; padding-right: 60px; margin-right: 6%; }
  body.layout-alternating .step:nth-child(even) { margin-right: 0; margin-left: 50%; padding-right: 0; padding-left: 60px; }
  body.layout-alternating .step-dot { left: unset; right: -54px; }
  body.layout-alternating .step:nth-child(even) .step-dot { right: unset; left: -54px; }
  </style>
</head>
<body>
  <div class="eyebrow">{{EYEBROW}}</div>
  <h1 class="title">{{TITLE}}</h1>
  <div class="timeline">{{STEPS_HTML}}</div>
  <div class="hairline"></div>
  <span class="page-num">{{PAGE_NUM}} / {{TOTAL}}</span>
</body>
</html>
